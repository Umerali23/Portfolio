<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome To Laiba-Frz Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="gamecontainer">
        <h2>Welcome To <span>@Laibafrz</span> Game!</h2>

        <div class="info">
            <span>Guesses: </span> <strong id="guesses">5</strong>
            <span>Score: </span> <strong id="score">0</strong>
        </div>
        
        <div class="scrambledword" id="worddisplay">------</div>

        <p id="hint-text"></p>

        <input type="text"  id="input-guess" placeholder="Guess the real word..." autocomplete="off">

        <button id="checkbtn">Check Guess</button>

        <button id="hintbtn">Show Hint!</button>

        <div class="message" id="message"></div>

    </div>
    <script src="script.js"></script>
</body>
</html>
